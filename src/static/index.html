<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hatake Kakashi</title>
</head>
<body>

<div>
  <label>
    <input id="notation-input" type="text"/>
  </label>
  <button type="submit" onclick="onClickButton()">check</button>
  <pre id="out"></pre>
</div>

<script>
  const onClickButton = async () => {
    const notation = document.getElementById('notation-input');
    const value = notation.value.trim();
    const res = await fetch('/chess', {method: 'POST', body: value});

    document.getElementById('out').textContent = await res.json();
  };
</script>
</body>
</html>
